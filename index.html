<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gelateria K2 Suite</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#c8a96e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="K2 Suite">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <!-- Icona -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/index.jsx"></script>

  <!-- Registra Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[K2] SW registrato:', reg.scope))
          .catch(err => console.warn('[K2] SW fallito:', err));
      });
    }
  </script>
</body>
</html>
